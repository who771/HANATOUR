<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>하나투어 2025 해외여행지 추천</title>
<style>

*{box-sizing:border-box;}
:root{
 --hana-purple:#5632c8; --hana-purple-dark:#3f229d; --hana-blue:#1f7eea;
 --hana-mint:#14c8b8; --hana-sky:#eaf7ff; --text-main:#1d1d2f;
 --text-sub:#5c6270; --border:#e1def4; --card:#ffffff;
}
body{margin:0;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
 background:linear-gradient(180deg,#f6f4ff 0%,#eef6ff 100%);color:var(--text-main);}
.wrap{max-width:1000px;margin:0 auto;padding:24px 18px 60px;}
header.top{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo .mark{display:flex;gap:3px;}
.logo .mark span{display:block;width:9px;height:30px;border-radius:3px;background:var(--hana-purple);}
.logo .mark span.mint{background:var(--hana-mint);height:22px;align-self:center;}
.logo b{font-size:24px;font-weight:900;color:var(--hana-purple);letter-spacing:-0.04em;}
.subtitle{color:var(--text-sub);font-size:14px;margin:2px 0 20px;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;
 margin-bottom:18px;}
.filters{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:640px){.filters{grid-template-columns:1fr;}}
.field label{display:block;margin-bottom:6px;color:var(--hana-purple);font-size:12px;
 font-weight:900;letter-spacing:0.08em;}
.field select,.field input{width:100%;padding:12px 14px;border:1px solid var(--border);
 border-radius:12px;font-size:15px;color:var(--text-main);background:#fff;}
.field input:focus,.field select:focus{outline:2px solid var(--hana-purple);border-color:transparent;}
.btn{margin-top:16px;width:100%;padding:15px;border:none;border-radius:14px;
 background:var(--hana-purple);color:#fff;font-size:17px;font-weight:900;cursor:pointer;
 letter-spacing:-0.02em;transition:background .15s;}
.btn:hover{background:var(--hana-purple-dark);}
.btn.sub{background:#fff;color:var(--hana-purple);border:1px solid var(--hana-purple);margin-top:10px;}
.cond{margin:4px 0 16px;font-size:13px;color:var(--text-sub);}
.cond b{color:var(--hana-purple);}
.cards{display:grid;gap:16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;
 overflow:hidden;}
.card .head{display:flex;align-items:center;gap:12px;padding:16px 20px;
 background:linear-gradient(90deg,#f3f0ff,#eaf7ff);}
.rank{flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:var(--hana-purple);
 color:#fff;font-weight:900;font-size:20px;display:flex;align-items:center;justify-content:center;}
.card.r2 .rank{background:var(--hana-blue);}
.card.r3 .rank{background:var(--hana-mint);}
.head .ttl{font-size:20px;font-weight:900;letter-spacing:-0.03em;}
.head .loc{font-size:13px;color:var(--text-sub);margin-top:2px;}
.badge{margin-left:auto;font-size:11px;font-weight:900;padding:6px 10px;border-radius:8px;
 background:#fff;border:1px solid var(--border);color:var(--hana-purple);white-space:nowrap;}
.body{padding:18px 20px;}
.row{display:flex;gap:8px;padding:8px 0;border-bottom:1px dashed var(--border);font-size:14px;}
.row:last-child{border-bottom:none;}
.row .k{flex:0 0 130px;color:var(--hana-purple);font-weight:800;font-size:12.5px;}
.row .v{flex:1;color:var(--text-main);line-height:1.6;}
.metric{font-weight:900;color:var(--hana-purple-dark);}
.trust-h{color:#0a8f70;font-weight:900;}
.trust-m{color:#b8860b;font-weight:900;}
.src{font-size:12px;color:var(--text-sub);}
.empty{padding:40px;text-align:center;color:var(--text-sub);}
.note{font-size:12px;color:var(--text-sub);line-height:1.7;margin-top:14px;
 background:#faf9ff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
.note b{color:var(--hana-purple);}


/* === 우측 도킹 프로모션 배너 (시안 B) === */
.promo-dock{position:fixed;top:120px;left:50%;margin-left:520px;width:200px;
 display:flex;flex-direction:column;gap:14px;z-index:50;}
.promo-dock a{display:block;border-radius:16px;overflow:hidden;border:1px solid var(--border);
 background:#fff;box-shadow:0 6px 18px rgba(86,50,200,.10);transition:transform .15s, box-shadow .15s;}
.promo-dock a:hover{transform:translateY(-4px);box-shadow:0 12px 26px rgba(86,50,200,.20);}
.promo-dock img{display:block;width:100%;height:auto;}
.promo-cap{font-size:13px;font-weight:800;color:var(--hana-purple);text-align:center;
 padding:8px 6px;background:#faf9ff;border-top:1px solid var(--border);}
@media(max-width:1480px){
 .promo-dock{position:static;margin:0 auto 18px;width:100%;max-width:640px;
  flex-direction:row;justify-content:center;}
 .promo-dock a{width:50%;max-width:300px;}
}
@media(max-width:640px){.promo-dock{flex-direction:column;align-items:center;}
 .promo-dock a{width:100%;}}
/* 장거리 특별추천 섹션 */
.special-h{margin:30px 0 4px;font-size:18px;font-weight:900;color:var(--hana-purple-dark);
 letter-spacing:-0.03em;}
.special-sub{font-size:13px;color:var(--text-sub);margin-bottom:12px;}
.card.special .rank{background:#ff7a3c;font-size:12px;line-height:1.1;text-align:center;}
.card.special .head{background:linear-gradient(90deg,#fff2ea,#eaf7ff);}
.book{display:inline-block;margin-top:6px;padding:11px 18px;border-radius:12px;
 background:var(--hana-blue);color:#fff;font-weight:900;font-size:14px;text-decoration:none;
 transition:background .15s;}
.book:hover{background:#1565c8;}

</style>
</head>

<div class="wrap">
 <header class="top">
  <div class="logo">
   <div class="mark"><span></span><span class="mint"></span><span></span></div>
   <b>하나투어</b>
  </div>
 </header>
 <div class="subtitle">2025년 하나투어 패키지 예약 기준, 해외여행지 추천 · 현지도착도시 TOP5</div>

 <div class="panel">
  <div class="filters">
   <div class="field">
    <label>성별</label>
    <select id="sex">
     <option value="all">전체</option>
     <option value="F">여성</option>
     <option value="M">남성</option>
    </select>
   </div>
   <div class="field">
    <label>나이 (예: 32)</label>
    <input id="age" type="number" min="0" max="99" placeholder="전체 보려면 비워두세요"/>
   </div>
   <div class="field">
    <label>출발월</label>
    <select id="month">
     <option value="">선택하세요</option>
     <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
     <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
     <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
     <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
    </select>
   </div>
  </div>
  <button class="btn" onclick="run()">여행지 추천하기</button>
 </div>

 <div id="cond" class="cond"></div>
 <div id="result" class="cards">
  <div class="card empty">성별·나이·출발월을 선택하고 <b>여행지 추천하기</b> 버튼을 눌러주세요.</div>
 </div>
 <div id="special"></div>

 <div class="note">
  <b>데이터 기준 안내</b><br/>
  · 순위는 2025년 하나투어 패키지 순예약인원 합계를 기준으로 합니다. (한국·국내 제외)<br/>
  · 1·2·3위는 검색한 출발월 기준, 4·5위는 2025년 전체 기준이며 1~3위와 중복되지 않습니다.<br/>
  · 장거리 특별 추천은 출발월 데이터와 지역별 성수기를 함께 반영해 선정합니다.
 </div>
</div>

function dispName(ci){
 const city=DATA.cities[ci], country=DATA.countries[ci];
 return (country && country!==city) ? country+' '+city : city;
}
function aggregate(sex, band, month, onlyLong){
 const sexIdx = sex==='M'?1 : sex==='F'?0 : null;
 const bandIdx = (band!=null)?band:null;
 const T={};
 for(const r of DATA.records){
  if(sexIdx!==null && r[0]!==sexIdx) continue;
  if(bandIdx!==null && r[1]!==bandIdx) continue;
  if(month!=null && r[2]!==month) continue;
  if(onlyLong && !LONG.has(r[3])) continue;
  T[r[3]]=(T[r[3]]||0)+r[4];
 }
 return T;
}
function ranked(T){
 return Object.keys(T).map(k=>[+k,T[k]]).sort((a,b)=>b[1]-a[1]);
}
function ageBandIdx(age){
 if(age===''||age==null||isNaN(age)) return null;
 const lab=(Math.floor(age/10)*10)+'대';
 const i=DATA.agebands.indexOf(lab);
 return i<0?null:i;
}
function endDay(m){ return new Date(2026,m,0).getDate(); }
function bookUrl(ci, month){
 const kw=encodeURIComponent(DATA.cities[ci]);
 const s='2026'+String(month).padStart(2,'0')+'01';
 const e='2026'+String(month).padStart(2,'0')+String(endDay(month)).padStart(2,'0');
 return 'https://www.hanatour.com/all-search?page=1&tab=package&keyword='+kw
  +'&pageSize=20&sort=D&strtDepDay='+s+'&endDepDay='+e
  +'&pkgRppdDvCds=01&depCityCds='+encodeURIComponent('인천');
}
function feat(ci){

 return country+'의 인기 여행 도시로, 다양한 패키지 상품이 운영됩니다.';
}

function longTop2(month, exclude){
 const cur=aggregate('all',null,month,true);
 let maxv=0; for(const k in cur) maxv=Math.max(maxv,cur[k]);
 let items=[];
 for(const k in cur){
  const ci=+k; if(exclude.has(ci)) continue;
  const reg=REGION[DATA.countries[ci]]||'기타';
  const ds=maxv>0?cur[ci]/maxv*100:0;
  const pk=(PEAK[reg]||[]).includes(month);
  items.push({ci,score:ds+(pk?30:0),v:cur[ci],peak:pk});
 }
 items.sort((a,b)=>(b.score-a.score)||(b.v-a.v));
 let picked=items.slice(0,2);
 if(picked.length<2 || picked.every(p=>p.v===0)){
  const yr=aggregate('all',null,null,true);
  let cand=[];
  for(const k in yr){
   const ci=+k; if(exclude.has(ci)) continue;
   const reg=REGION[DATA.countries[ci]]||'기타';
   if((PEAK[reg]||[]).includes(month)) cand.push({ci,v:yr[ci],peak:true});
  }
  cand.sort((a,b)=>b.v-a.v);
  for(const c of cand){ if(!picked.some(p=>p.ci===c.ci)){picked.push({ci:c.ci,v:c.v,peak:true});} if(picked.length>=2)break; }
 }
 return picked.slice(0,2);
}

 if(!month){ cond.innerHTML=''; sp.innerHTML='';
   box.innerHTML='<div class="card empty">출발월을 선택해 주세요.</div>'; return; }
 const m=+month;
 const band=ageBandIdx(ageRaw===''?null:+ageRaw);
 const sexTxt = sex==='M'?'남성':(sex==='F'?'여성':'전체');

 // 1·2·3위: 검색한 월 인기
 const monthRanked=ranked(aggregate(sex,band,m,false));
 const top3=monthRanked.slice(0,3).map(x=>x[0]);
 // 4·5위: 연간 인기, 중복 제외
 const yearRanked=ranked(aggregate(sex,band,null,false));
 const rest=yearRanked.map(x=>x[0]).filter(ci=>top3.indexOf(ci)<0).slice(0,2);
 const picked=top3.concat(rest);
 if(picked.length===0){ box.innerHTML='<div class="card empty">해당 조건의 데이터가 없습니다.</div>'; sp.innerHTML=''; return; }

 let html='';
 picked.forEach((ci,i)=>{
  const rank=i+1;
  const basis = rank<=3 ? (MONTHS_KR[m]+' 검색 시 인기 여행지') : ('2025년 연간 인기 여행지');
  html+=cardHtml(ci,rank,basis,m);
 });

 // 장거리 특별 추천 TOP2 (출발월만 적용)
 const excl=new Set(picked);
 const lt=longTop2(m, excl);
 if(lt.length){
  let sh='<div class="special-h">장거리 특별 추천</div>'
    +'<div class="special-sub">'+MONTHS_KR[m]+' 출발 기준, 유럽·미주·오세아니아 등 장거리 추천 여행지</div>'
    +'<div class="cards">';
  lt.forEach(p=>{ sh+=specialCard(p.ci,m,p.peak); });
  sh+='</div>';
  sp.innerHTML=sh;
 } else { sp.innerHTML=''; }
}
</script>
